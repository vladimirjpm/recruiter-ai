services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recruiter-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recruiter_ai
      POSTGRES_USER: recruiter
      POSTGRES_PASSWORD: recruiter
    ports:
      - "5432:5432"
    volumes:
      - recruiter_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruiter -d recruiter_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  recruiter_ai_pgdata:
